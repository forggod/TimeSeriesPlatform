{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">

        <div class="card shadow">
            <div class="card-body">

                <h3 class="mb-3">Вход</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-primary w-100">
                        Войти
                    </button>
                </form>

                <hr>

                <p class="text-center mb-0">
                    Нет аккаунта?
                    <a href="{% url 'register' %}">Зарегистрироваться</a>
                </p>
            </div>
        </div>

    </div>
</div>

{% endblock %}
