{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">

        <div class="card shadow">
            <div class="card-body">

                <h3 class="mb-3">Регистрация</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-success w-100">
                        Зарегистрироваться
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
