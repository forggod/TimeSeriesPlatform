<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time Series Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">TS Platform</a>

    <div class="ms-auto d-flex align-items-center gap-2">

        {% if user.is_authenticated %}
            <span class="text-white me-2">
                {{ user.username }}
            </span>

            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                Logout
            </a>

        {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                Login
            </a>

            <a href="{% url 'register' %}" class="btn btn-primary btn-sm">
                Register
            </a>
        {% endif %}

    </div>
</nav>

<!-- LAYOUT -->
<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 pt-3">

            <a class="d-block mb-2" href="/">Dashboard</a>
            <a class="d-block mb-2" href="#">Datasets</a>
            <a class="d-block mb-2" href="#">Models</a>
            <a class="d-block mb-2" href="#">Forecast</a>

        </div>

        <!-- MAIN -->
        <div class="col-10 p-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>
</div>

</body>
</html>
